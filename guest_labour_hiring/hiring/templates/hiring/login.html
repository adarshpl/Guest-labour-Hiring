<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Guest Labour Hiring</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <style>
    :root{--ink:#03050d;--gold:#d4a84b;--gold2:#f5c842;--cream:#f0ece2;--mist:#6b7591;--wire:rgba(255,255,255,0.07);--border:rgba(212,168,75,0.15);}
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'DM Sans',sans-serif;background:var(--ink);color:var(--cream);min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden;}
    ::-webkit-scrollbar{width:3px;}::-webkit-scrollbar-thumb{background:var(--gold);}

    /* BG */
    .grid-bg{position:fixed;inset:0;pointer-events:none;background-image:linear-gradient(rgba(212,168,75,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(212,168,75,0.04) 1px,transparent 1px);background-size:72px 72px;mask-image:radial-gradient(ellipse 70% 70% at 50% 50%,black 20%,transparent 80%);}
    .hero-glow{position:fixed;top:50%;left:50%;width:800px;height:800px;background:radial-gradient(circle,rgba(212,168,75,0.08) 0%,transparent 65%);transform:translate(-50%,-50%);border-radius:50%;animation:pulse 5s ease-in-out infinite;pointer-events:none;}
    @keyframes pulse{0%,100%{transform:translate(-50%,-50%) scale(1);}50%{transform:translate(-50%,-50%) scale(1.1);opacity:.7;}}

    /* WRAP */
    .login-wrap{width:100%;max-width:420px;padding:24px;position:relative;z-index:10;}

    /* TOP */
    .login-top{text-align:center;margin-bottom:32px;animation:fadeD .7s .1s ease both;}
    @keyframes fadeD{from{opacity:0;transform:translateY(-16px);}to{opacity:1;transform:translateY(0);}}
    .login-icon{width:64px;height:64px;background:linear-gradient(135deg,var(--gold),#9a6010);border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:1.6rem;color:#000;margin:0 auto 18px;box-shadow:0 0 40px rgba(212,168,75,0.4);}
    .login-title{font-family:'Bebas Neue',sans-serif;font-size:1.6rem;letter-spacing:0.1em;color:var(--cream);margin-bottom:4px;}
    .login-sub{font-size:0.75rem;color:var(--mist);letter-spacing:0.07em;}

    /* CARD */
    .login-card{background:rgba(255,255,255,0.025);border:1px solid var(--wire);border-radius:18px;padding:36px;box-shadow:0 20px 60px rgba(0,0,0,0.5);animation:fadeU .7s .2s ease both;}
    @keyframes fadeU{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
    .login-card::before{content:'';display:block;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin-bottom:28px;opacity:0.35;}

    /* STATUS */
    .sys-status{display:flex;align-items:center;justify-content:center;gap:8px;font-size:0.7rem;letter-spacing:0.12em;text-transform:uppercase;color:#48c78e;margin-bottom:24px;}
    .s-dot{width:7px;height:7px;background:#48c78e;border-radius:50%;box-shadow:0 0 8px #48c78e;animation:blink 2s ease-in-out infinite;}
    @keyframes blink{0%,100%{opacity:1;}50%{opacity:.2;}}

    /* ERROR */
    .err-msg{background:rgba(255,95,95,0.07);border:1px solid rgba(255,95,95,0.25);border-radius:10px;padding:12px 16px;margin-bottom:20px;font-size:0.8rem;color:#ff5f5f;display:flex;align-items:center;gap:9px;animation:fadeU .3s ease;}

    /* FIELD */
    .f-group{margin-bottom:18px;}
    .f-label{display:block;font-size:0.7rem;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:var(--mist);margin-bottom:8px;}
    .f-wrap{position:relative;}
    .f-icon{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--mist);font-size:1rem;pointer-events:none;transition:color .2s;}
    .f-ctrl{width:100%;background:rgba(255,255,255,0.04);border:1px solid var(--wire);border-radius:10px;padding:12px 14px 12px 40px;font-size:0.88rem;font-family:'DM Sans',sans-serif;color:var(--cream);outline:none;transition:all .2s;}
    .f-ctrl:focus{border-color:rgba(212,168,75,0.5);background:rgba(212,168,75,0.04);box-shadow:0 0 0 3px rgba(212,168,75,0.08);}
    .f-ctrl:focus~.f-icon,.f-wrap:focus-within .f-icon{color:var(--gold);}
    .f-ctrl option{background:#03050d;}

    /* BTN */
    .btn-login{width:100%;background:linear-gradient(135deg,var(--gold),#9a6010);color:#000;padding:14px;font-family:'Bebas Neue',sans-serif;font-size:1.05rem;letter-spacing:0.12em;border:none;border-radius:10px;cursor:pointer;transition:all .3s;margin-top:6px;display:flex;align-items:center;justify-content:center;gap:10px;box-shadow:0 6px 24px rgba(212,168,75,0.35);}
    .btn-login:hover{transform:translateY(-2px);box-shadow:0 12px 40px rgba(212,168,75,0.5);}

    .back-link{text-align:center;margin-top:20px;}
    .back-link a{color:var(--mist);font-size:0.75rem;text-decoration:none;transition:color .2s;letter-spacing:0.05em;}
    .back-link a:hover{color:var(--gold);}
  </style>
</head>
<body>
<div class="grid-bg"></div>
<div class="hero-glow"></div>
<div class="login-wrap">
  <div class="login-top">
    <div class="login-icon"><i class="bi bi-people-fill"></i></div>
    <div class="login-title">Guest Labour Hiring</div>
    <div class="login-sub">Secure Access Portal</div>
  </div>
  <div class="login-card">
    <div class="sys-status"><div class="s-dot"></div>System Online · Authenticate to Continue</div>
    {% if messages %}{% for msg in messages %}<div class="err-msg"><i class="bi bi-exclamation-circle"></i>{{ msg }}</div>{% endfor %}{% endif %}
    <form method="post">
      {% csrf_token %}
      <div class="f-group">
        <label class="f-label">Username</label>
        <div class="f-wrap">
          <input type="text" name="username" class="f-ctrl" placeholder="Enter your username" required autocomplete="off">
          <i class="bi bi-person f-icon"></i>
        </div>
      </div>
      <div class="f-group">
        <label class="f-label">Password</label>
        <div class="f-wrap">
          <input type="password" name="password" class="f-ctrl" placeholder="Enter your password" required>
          <i class="bi bi-lock f-icon"></i>
        </div>
      </div>
      <div class="f-group">
        <label class="f-label">Role</label>
        <div class="f-wrap">
          <select name="user_type" class="f-ctrl" required>
            <option value="">— Select your role —</option>
            <option value="Admin">Admin</option>
            <option value="Police">Police</option>
            <option value="Employer">Employer</option>
            <option value="Worker">Worker</option>
          </select>
          <i class="bi bi-shield f-icon"></i>
        </div>
      </div>
      <button type="submit" class="btn-login"><i class="bi bi-box-arrow-in-right"></i> Login</button>
    </form>
  </div>
  <div class="back-link"><a href="/">← Back to Home</a></div>
</div>
</body>
</html>
