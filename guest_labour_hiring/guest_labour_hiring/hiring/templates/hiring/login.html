<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — GLH System</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
  <style>
    body { background: linear-gradient(135deg,#1a2a4a,#2563eb); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .card { border: none; border-radius: 16px; box-shadow: 0 16px 48px rgba(0,0,0,.25); }
    .card-header { background: #1a2a4a; color: #fff; border-radius: 16px 16px 0 0 !important; padding: 28px; text-align: center; }
  </style>
</head>
<body>
<div class="container">
  <div class="row justify-content-center">
    <div class="col-md-5">
      <div class="card">
        <div class="card-header">
          <i class="bi bi-people-fill fs-1 mb-2 d-block"></i>
          <h4 class="mb-0">Guest Labour Hiring System</h4>
          <p class="text-muted small mb-0">Please login to continue</p>
        </div>
        <div class="card-body p-4">
          {% if messages %}
            {% for msg in messages %}
              <div class="alert alert-danger">{{ msg }}</div>
            {% endfor %}
          {% endif %}
          <form method="post">
            {% csrf_token %}
            <div class="mb-3">
              <label class="form-label fw-semibold">Username</label>
              {{ form.username }}
            </div>
            <div class="mb-3">
              <label class="form-label fw-semibold">Password</label>
              {{ form.password }}
            </div>
            <div class="mb-4">
              <label class="form-label fw-semibold">Login As</label>
              {{ form.user_type }}
            </div>
            <button type="submit" class="btn btn-primary w-100 py-2">
              <i class="bi bi-box-arrow-in-right me-2"></i>Login
            </button>
          </form>
          <div class="text-center mt-3">
            <a href="{% url 'home' %}" class="text-muted small">← Back to Home</a>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
