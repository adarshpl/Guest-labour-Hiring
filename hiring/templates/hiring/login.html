<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — GLH System</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <style>
    :root{--accent:#4f8eff;--accent2:#7c3aed;--bg:#0a0e1a;--text:#e8eaf0;--text2:#8892a4;--text3:#535f75;--border:rgba(255,255,255,0.07);}
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;}
    body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 30% 40%,rgba(79,142,255,0.1) 0%,transparent 60%),radial-gradient(ellipse at 70% 70%,rgba(124,58,237,0.08) 0%,transparent 60%);pointer-events:none;}
    .login-wrap{width:100%;max-width:440px;padding:24px;position:relative;z-index:1;}
    .login-brand{text-align:center;margin-bottom:36px;}
    .brand-icon{width:56px;height:56px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:1.5rem;margin:0 auto 16px;box-shadow:0 8px 24px rgba(79,142,255,0.3);}
    .brand-title{font-family:'Syne',sans-serif;font-size:1.4rem;font-weight:800;color:var(--text);margin-bottom:6px;}
    .brand-sub{font-size:0.85rem;color:var(--text3);}
    .login-card{background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:18px;padding:36px;backdrop-filter:blur(20px);}
    .alert-error{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.25);color:#ef4444;padding:12px 16px;border-radius:8px;font-size:0.85rem;margin-bottom:20px;display:flex;align-items:center;gap:10px;}
    .form-group{margin-bottom:18px;}
    .form-label{display:block;font-size:0.78rem;font-weight:500;color:var(--text2);margin-bottom:8px;letter-spacing:0.02em;}
    .input-wrap{position:relative;}
    .input-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:0.95rem;pointer-events:none;}
    .form-control{width:100%;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:10px;padding:12px 14px 12px 40px;font-size:0.875rem;font-family:'DM Sans',sans-serif;color:var(--text);transition:all 0.2s;}
    .form-control:focus{outline:none;border-color:rgba(79,142,255,0.5);background:rgba(79,142,255,0.05);box-shadow:0 0 0 3px rgba(79,142,255,0.1);}
    .form-control option{background:#0f1527;}
    select.form-control{appearance:none;}
    .btn-submit{width:100%;background:linear-gradient(135deg,var(--accent),#3a6fd8);color:#fff;border:none;border-radius:10px;padding:14px;font-size:0.95rem;font-weight:500;font-family:'DM Sans',sans-serif;cursor:pointer;transition:all 0.2s;box-shadow:0 6px 20px rgba(79,142,255,0.3);display:flex;align-items:center;justify-content:center;gap:8px;margin-top:8px;}
    .btn-submit:hover{transform:translateY(-1px);box-shadow:0 8px 28px rgba(79,142,255,0.4);}
    .back-link{text-align:center;margin-top:20px;}
    .back-link a{color:var(--text3);font-size:0.825rem;text-decoration:none;transition:color 0.2s;}
    .back-link a:hover{color:var(--text2);}
    @keyframes fadeUp{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
    .login-wrap{animation:fadeUp 0.5s ease;}
  </style>
</head>
<body>
<div class="login-wrap">
  <div class="login-brand">
    <div class="brand-icon"><i class="bi bi-people-fill" style="color:#fff"></i></div>
    <div class="brand-title">Guest Labour Hiring</div>
    <div class="brand-sub">Sign in to your account</div>
  </div>
  <div class="login-card">
    {% if messages %}{% for msg in messages %}<div class="alert-error"><i class="bi bi-exclamation-circle"></i>{{ msg }}</div>{% endfor %}{% endif %}
    <form method="post">
      {% csrf_token %}
      <div class="form-group">
        <label class="form-label">Username</label>
        <div class="input-wrap">
          <i class="bi bi-person input-icon"></i>
          <input type="text" name="username" class="form-control" placeholder="Enter username" required>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <div class="input-wrap">
          <i class="bi bi-lock input-icon"></i>
          <input type="password" name="password" class="form-control" placeholder="Enter password" required>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Login As</label>
        <div class="input-wrap">
          <i class="bi bi-shield input-icon"></i>
          <select name="user_type" class="form-control" required>
            <option value="">Select your role</option>
            <option value="Admin">Admin</option>
            <option value="Police">Police</option>
            <option value="Employer">Employer</option>
            <option value="Worker">Worker</option>
          </select>
        </div>
      </div>
      <button type="submit" class="btn-submit"><i class="bi bi-box-arrow-in-right"></i> Sign In</button>
    </form>
  </div>
  <div class="back-link"><a href="{% url 'home' %}">← Back to Home</a></div>
</div>
</body>
</html>
